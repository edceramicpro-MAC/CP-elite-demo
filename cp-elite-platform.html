<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ceramic Pro Elite — Bot Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Rajdhani:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090d;--bg2:#0b0f16;--bg3:#0f1520;
  --surf:#141c28;--surf2:#192030;--surf3:#1e2840;
  --bdr:rgba(255,255,255,0.06);--bdr2:rgba(255,255,255,0.11);--bdr3:rgba(255,255,255,0.18);
  --blue:#3d8ef0;--bdim:rgba(61,142,240,0.12);--bglow:rgba(61,142,240,0.28);
  --teal:#2ec4b6;--tdim:rgba(46,196,182,0.12);--tglow:rgba(46,196,182,0.25);
  --gold:#c9913a;--gdim:rgba(201,145,58,0.13);--gglow:rgba(201,145,58,0.28);
  --green:#2eb870;--gndim:rgba(46,184,112,0.12);
  --red:#e84545;--rddim:rgba(232,69,69,0.12);
  --purple:#9d7ff0;--pdim:rgba(157,127,240,0.12);
  --text:#dde2ec;--text2:#7a869e;--text3:#424e62;
  --fh:'Rajdhani',sans-serif;--fb:'Outfit',sans-serif;--fm:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surf2);border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(201,145,58,0.2)}50%{box-shadow:0 0 18px rgba(201,145,58,0.4)}}
.fadein{animation:fadeUp 0.22s ease forwards}

/* ── SHELL ── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:206px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.cp-logo{padding:14px 14px 12px;border-bottom:1px solid var(--bdr)}
.cp-badge{display:flex;align-items:center;gap:9px;background:var(--gdim);border:1px solid var(--gglow);border-radius:8px;padding:9px 11px;animation:glow 3s infinite}
.cp-gem{width:28px;height:28px;background:linear-gradient(135deg,#e6a84a,#c9913a);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:14px;font-weight:800;color:#000;flex-shrink:0}
.cp-name{font-family:var(--fh);font-size:15px;font-weight:700;color:var(--gold);line-height:1.1}
.cp-tier{font-size:9px;color:rgba(201,145,58,0.55);letter-spacing:1.8px;text-transform:uppercase}
.nav-sec{padding:10px 8px 4px}
.nav-lbl{font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);padding:0 8px 7px;font-family:var(--fm)}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px;font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.13s;margin-bottom:1px;user-select:none}
.nav-item:hover{background:var(--surf);color:var(--text)}
.nav-item.on{background:var(--bdim);color:var(--blue);font-weight:500}
.nav-item.on-gold{background:var(--gdim);color:var(--gold);font-weight:500}
.nav-icon{font-size:15px;width:17px;text-align:center;opacity:0.75}
.nav-badge{margin-left:auto;font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;font-family:var(--fm)}
.nb-blue{background:var(--bdim);color:var(--blue)}
.nb-gold{background:var(--gdim);color:var(--gold)}
.nb-green{background:var(--gndim);color:var(--green)}
.sidebar-bots{margin-top:auto;padding:10px 10px 13px;border-top:1px solid var(--bdr)}
.bot-row{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:5px;cursor:pointer;transition:background 0.12s}
.bot-row:hover{background:var(--surf)}
.bdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.bdot.on{background:var(--green);animation:pulse 2s infinite}
.bdot.off{background:var(--text3)}
.bot-lbl{font-size:12px;color:var(--text2)}
.bot-ct{margin-left:auto;font-size:10px;color:var(--text3);font-family:var(--fm)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;padding:0 20px;flex-shrink:0;z-index:20}
.topbar-titles{}
.topbar-title{font-family:var(--fh);font-size:17px;font-weight:700;color:var(--text);line-height:1}
.topbar-sub{font-size:11px;color:var(--text3)}
.tab-row{display:flex;gap:3px;margin-left:14px}
.tab{padding:5px 12px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.13s;color:var(--text2);border:1px solid transparent;font-family:var(--fb);background:transparent}
.tab:hover{background:var(--surf);color:var(--text)}
.tab.on{background:var(--bdim);color:var(--blue);border-color:rgba(61,142,240,0.2)}
.tab.on-gold{background:var(--gdim);color:var(--gold);border-color:var(--gglow)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:9px}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--gndim);border:1px solid rgba(46,184,112,0.2);padding:3px 9px;border-radius:20px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
.live-txt{font-size:10px;color:var(--green);font-weight:700;letter-spacing:0.8px;font-family:var(--fm)}
.clock{font-family:var(--fm);font-size:12px;color:var(--text3)}
.dealer-pill{display:flex;align-items:center;gap:6px;background:var(--surf);border:1px solid var(--bdr2);padding:4px 10px;border-radius:20px;cursor:pointer;font-size:12px;color:var(--text2);transition:all 0.15s}
.dealer-pill:hover{border-color:var(--gold);color:var(--gold)}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:18px 20px}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:14px}
.card-head{padding:12px 15px 10px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:9px}
.acc{width:3px;height:16px;border-radius:2px;flex-shrink:0}
.card-title{font-family:var(--fh);font-size:13px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text)}
.card-sub{font-size:11px;color:var(--text3);margin-left:auto;font-family:var(--fm)}
.card-body{padding:13px 15px}

/* ── METRICS ── */
.metric-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
.mc{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:11px 13px}
.mc-lbl{font-size:9px;letter-spacing:1.3px;text-transform:uppercase;color:var(--text3);margin-bottom:5px;font-family:var(--fm)}
.mc-val{font-size:22px;font-weight:700;font-family:var(--fm);line-height:1}
.mc-d{font-size:10px;color:var(--green);margin-top:4px}

/* ── FUNNEL ── */
.funnel-wrap{display:flex;gap:10px;overflow-x:auto;padding:12px 15px}
.fcol{min-width:155px;flex-shrink:0}
.fcol-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.fstage{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.fct{font-size:11px;font-family:var(--fm);background:var(--surf);padding:1px 6px;border-radius:8px;color:var(--text)}
.lc{background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:8px 10px;margin-bottom:5px;cursor:pointer;transition:all 0.13s}
.lc:hover{border-color:var(--blue)}
.lc-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.lc-veh{font-size:11px;color:var(--text2);margin-bottom:5px}
.lc-foot{display:flex;align-items:center;gap:5px}
.ldot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.lc-svc{font-size:10px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lc-time{font-size:10px;color:var(--text3);font-family:var(--fm)}

/* ── BOT SUITE ── */
.bots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:13px 15px}
.bot-card{background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:13px;transition:border-color 0.15s}
.bot-card-name{font-family:var(--fh);font-size:16px;font-weight:700;margin-bottom:2px}
.bot-card-desc{font-size:11px;color:var(--text2);margin-bottom:10px}
.bot-stats{display:flex;gap:14px;margin-bottom:10px}
.bs-val{font-size:18px;font-weight:700;font-family:var(--fm)}
.bs-lbl{font-size:9px;color:var(--text3)}
.bot-foot{display:flex;align-items:center;justify-content:space-between}
.tog{width:28px;height:15px;border-radius:8px;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0}
.tog.on{background:var(--green)}
.tog.off{background:var(--text3)}
.tog-k{position:absolute;top:2px;width:11px;height:11px;background:#fff;border-radius:50%;transition:left 0.18s}
.tog.on .tog-k{left:15px}
.tog.off .tog-k{left:2px}

/* ── AGENT BROWSER ── */
.agent-wrap{display:flex;height:400px}
.convo-list{width:182px;flex-shrink:0;border-right:1px solid var(--bdr);overflow-y:auto}
.ci{padding:10px 12px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background 0.12s;border-left:2px solid transparent}
.ci:hover{background:var(--surf)}
.ci.on{background:var(--bdim);border-left-color:var(--blue)}
.ci-name{font-size:12px;font-weight:600;color:var(--text)}
.ci-prev{font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-phase{font-size:9px;font-weight:700;margin-top:4px;font-family:var(--fm)}
.chat-pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-hdr{padding:9px 13px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:9px}
.msgs{flex:1;overflow-y:auto;padding:10px 13px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;flex-direction:column;max-width:82%}
.msg.in{align-self:flex-start}
.msg.out{align-self:flex-end}
.bubble{padding:8px 11px;border-radius:9px;font-size:12px;line-height:1.5}
.msg.in .bubble{background:var(--surf);border:1px solid var(--bdr);border-radius:9px 9px 9px 2px;color:var(--text)}
.msg.out .bubble{background:var(--bdim);border:1px solid rgba(61,142,240,0.18);border-radius:9px 9px 2px 9px;color:var(--text)}
.msg-time{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--fm)}
.msg.out .msg-time{text-align:right}
.bot-tag{font-size:9px;color:var(--blue);text-align:right;font-family:var(--fm)}
.reason-pane{width:222px;flex-shrink:0;border-left:1px solid var(--bdr);overflow-y:auto;padding:11px 12px}
.r-title{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;font-family:var(--fm)}
.r-step{margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid var(--bdr)}
.r-step:last-child{border-bottom:none}
.r-lbl{font-size:9px;font-weight:700;color:var(--blue);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:3px;font-family:var(--fm)}
.r-txt{font-size:11px;color:var(--text2);line-height:1.5}

/* ── PIPELINE ── */
.pipe-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.pipe-row:last-child{border-bottom:none}
.pipe-stage{font-size:11px;color:var(--text2);width:76px}
.pipe-trk{flex:1;height:5px;background:var(--surf);border-radius:3px}
.pipe-bar{height:5px;border-radius:3px}
.pipe-n{font-size:11px;font-family:var(--fm);color:var(--text2);width:62px;text-align:right}
.pipe-v{font-size:12px;font-weight:600;font-family:var(--fm);color:var(--green);width:54px;text-align:right}

/* ── MAP ── */
.map-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.map-rk{font-size:10px;color:var(--text3);width:14px;font-family:var(--fm)}
.map-city{font-size:12px;color:var(--text);flex:1}
.map-trk{flex:1;height:3px;background:var(--surf);border-radius:2px}
.map-bar{height:3px;border-radius:2px;background:var(--blue)}
.map-ct{font-size:11px;color:var(--text2);font-family:var(--fm);width:44px;text-align:right}

/* ── GBP ── */
.gbp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.gbp-s{background:var(--surf);border-radius:7px;padding:10px;border:1px solid var(--bdr)}
.gbp-v{font-size:20px;font-weight:700;font-family:var(--fm)}
.gbp-l{font-size:9px;color:var(--text3);margin-top:3px;letter-spacing:0.5px;text-transform:uppercase}
.gbp-d{font-size:10px;color:var(--green);margin-top:3px}

/* ── REVIEWS ── */
.rb-row{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.rb-lbl{font-size:10px;color:var(--text2);width:10px;text-align:center}
.rb-trk{flex:1;height:3px;background:var(--surf);border-radius:2px}
.rb-fill{height:3px;border-radius:2px}

/* ── QUEUE ── */
.qi{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--bdr)}
.qi:last-child{border-bottom:none}
.qi-init{width:32px;height:32px;border-radius:7px;background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0}
.qi-name{font-size:12px;font-weight:600;color:var(--text)}
.qi-veh{font-size:11px;color:var(--text2);margin-top:1px}
.qi-days{font-size:10px;color:var(--text3);font-family:var(--fm)}
.warm-tag{font-size:9px;font-weight:700;background:var(--gdim);color:var(--gold);padding:1px 5px;border-radius:4px;margin-left:4px}
.nudge-btn{margin-left:auto;flex-shrink:0;background:var(--bdim);border:1px solid rgba(61,142,240,0.2);color:var(--blue);font-size:11px;font-weight:600;padding:4px 11px;border-radius:5px;cursor:pointer;transition:all 0.13s;font-family:var(--fb)}
.nudge-btn:hover{background:var(--blue);color:#000}
.nudge-btn.sent{background:var(--gndim);border-color:var(--green);color:var(--green)}

/* ── NETWORK ── */
.network-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.dealer-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:9px;padding:13px;cursor:pointer;transition:all 0.15s}
.dealer-card:hover{border-color:var(--gold);transform:translateY(-1px)}
.dc-name{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.dc-loc{font-size:11px;color:var(--text2);margin-bottom:9px}
.dc-stats{display:flex;gap:13px;margin-bottom:8px}
.dcs-val{font-size:17px;font-weight:700;font-family:var(--fm)}
.dcs-lbl{font-size:9px;color:var(--text3)}
.cp-cert{font-size:9px;color:var(--gold);background:var(--gdim);padding:1px 6px;border-radius:4px;font-weight:600;letter-spacing:0.5px;font-family:var(--fm)}

/* ── BOT CONFIG ── */
.cfg-tabs{display:flex;gap:5px;padding:12px 15px 0;border-bottom:1px solid var(--bdr)}
.cfg-tab{padding:6px 13px;border-radius:5px 5px 0 0;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.13s;color:var(--text2);border:1px solid transparent;border-bottom:none;font-family:var(--fb);margin-bottom:-1px}
.cfg-tab:hover{color:var(--text)}
.cfg-tab.on{color:var(--blue);border-color:rgba(61,142,240,0.2);background:var(--bdim)}
.cfg-tab.on-teal{color:var(--teal);border-color:rgba(46,196,182,0.2);background:var(--tdim)}
.cfg-tab.on-purple{color:var(--purple);border-color:rgba(157,127,240,0.2);background:var(--pdim)}
.cfg-body{padding:15px}
.cfg-2col{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.fld{margin-bottom:13px}
.fld:last-child{margin-bottom:0}
.fld-lbl{font-size:10px;font-weight:600;color:var(--text2);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:7px;font-family:var(--fm)}
.fld-hint{font-size:11px;color:var(--text3);margin-top:4px}
input.inp,select.sel,textarea.txa{width:100%;background:var(--surf);border:1px solid var(--bdr);border-radius:7px;padding:9px 12px;font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s;font-family:var(--fb)}
input.inp:focus,select.sel:focus,textarea.txa:focus{border-color:var(--bdr2)}
textarea.txa{resize:vertical;min-height:80px;line-height:1.5}
select.sel{appearance:none;cursor:pointer}

/* ── PERSONA DROPDOWN ── */
.persona-wrap{position:relative}
.persona-cur{display:flex;align-items:center;gap:10px;background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:10px 12px;cursor:pointer;transition:border-color 0.15s}
.persona-cur:hover,.persona-cur.open{border-color:var(--bdr2)}
.p-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.p-name{font-size:14px;font-weight:600;color:var(--text)}
.p-role{font-size:11px;color:var(--text2);margin-top:1px}
.persona-drop{position:absolute;top:calc(100% + 5px);left:0;right:0;background:var(--bg3);border:1px solid var(--bdr2);border-radius:9px;overflow:hidden;z-index:200;box-shadow:0 10px 36px rgba(0,0,0,0.55)}
.p-opt{display:flex;align-items:center;gap:10px;padding:11px 12px;cursor:pointer;transition:background 0.12s;border-bottom:1px solid var(--bdr)}
.p-opt:last-child{border-bottom:none}
.p-opt:hover{background:var(--surf)}
.p-opt.sel{background:var(--bdim)}
.po-name{font-size:13px;font-weight:600;color:var(--text)}
.po-desc{font-size:11px;color:var(--text2);margin-top:1px}
.po-tags{display:flex;gap:4px;margin-top:4px}
.po-tag{font-size:9px;padding:1px 5px;border-radius:4px;font-family:var(--fm);font-weight:600}

/* ── TONE TRACK ── */
.tone-track{display:flex;gap:4px}
.tone-pip{flex:1;height:6px;border-radius:3px;cursor:pointer;transition:background 0.12s}

/* ── TRAIT GRID ── */
.trait-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.trait-tog{display:flex;align-items:center;gap:8px;background:var(--surf);border:1px solid var(--bdr);border-radius:7px;padding:8px 10px;cursor:pointer;transition:all 0.13s}
.trait-tog.on{border-color:rgba(61,142,240,0.3);background:var(--bdim)}
.trait-lbl{font-size:12px;color:var(--text2);flex:1}
.trait-tog.on .trait-lbl{color:var(--blue)}
.mini-tog{width:22px;height:12px;border-radius:6px;flex-shrink:0;position:relative;transition:background 0.15s}
.mini-tog.on{background:var(--blue)}
.mini-tog.off{background:var(--text3)}
.mini-k{position:absolute;top:1.5px;width:9px;height:9px;background:#fff;border-radius:50%;transition:left 0.15s}
.mini-tog.on .mini-k{left:11px}
.mini-tog.off .mini-k{left:1.5px}

/* ── PREVIEW BUBBLE ── */
.preview-box{background:var(--bg);border-radius:9px;padding:13px;border:1px solid var(--bdr)}
.preview-lbl{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:9px;font-family:var(--fm)}
.preview-msg{background:var(--bdim);border:1px solid rgba(61,142,240,0.15);border-radius:9px 9px 2px 9px;padding:10px 12px;font-size:12px;color:var(--text);line-height:1.6;max-width:88%;margin-left:auto}
.preview-from{text-align:right;font-size:9px;color:var(--blue);margin-top:4px;font-family:var(--fm)}

/* ── PLATFORM CARDS ── */

// ── NAV ───────────────────────────────────────────────────────────────────
function showView(v){
  currentView=v;
  document.querySelectorAll('.nav-item').forEach(el=>{el.classList.remove('on','on-gold')});
  const navMap={dashboard:0,funnel:1,agent:2,demo:3,config:4,network:5};
  const items=document.querySelectorAll('.nav-item');
  if(items[navMap[v]]){
    items[navMap[v]].classList.add(v==='network'?'on-gold':'on');
  }
  const titles={
    dashboard:['NXT Wraps — Live Dashboard','Waldorf, Maryland · Ceramic Pro Elite'],
    funnel:['NEPQ Live Funnel','98 tint-tagged leads · real-time'],
    agent:['AI Agent Browser','TintBot handling 12 active conversations'],
    demo:['Live Bot Demo','Interactive coaching — try all three bots'],
    config:['Bot Configuration','TintBot · AdBot · ContentBot settings'],
    network:['Elite Dealer Network','88 dealers · ceramicpro.com · Master view'],
  };
  document.getElementById('topbar-title').textContent=titles[v][0];
  document.getElementById('topbar-sub').textContent=titles[v][1];
  renderContent();
}

function toggleNetwork(){
  showView(currentView==='network'?'dashboard':'network');
}

function toggleBot(id){
  botToggles[id]=!botToggles[id];
  renderContent();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderContent(){
  const el=document.getElementById('content');
  el.innerHTML='';
  el.className='content fadein';
  void el.offsetWidth;

  if(currentView==='dashboard') el.innerHTML=renderDashboard();
  else if(currentView==='funnel') el.innerHTML=renderFunnelPage();
  else if(currentView==='agent') el.innerHTML=renderAgentPage();
  else if(currentView==='demo') el.innerHTML=renderDemoPage();
  else if(currentView==='config') el.innerHTML=renderConfigPage();
  else if(currentView==='network') el.innerHTML=renderNetworkPage();

  if(currentView==='demo') initDemo();
  attachEvents();
}

function switchCfgTab(el,cls){
  document.querySelectorAll('.cfg-tab').forEach(t=>{t.className='cfg-tab'});
  el.className='cfg-tab '+cls;
  const idx=Array.from(el.parentElement.children).indexOf(el);
  const body=document.getElementById('cfg-body');
  const traitOpts=["Uses first names","Asks NEPQ questions first","Educates on products","CP Elite credentials","Fast replies","Mentions warranty","Celebrates bookings","Avoids hard sell"];
  const p=PERSONAS.find(x=>x.id===currentPersona);
  if(idx===0) body.innerHTML=renderTintBotCfg(p,traitOpts);
  else if(idx===1) body.innerHTML=renderAdBotCfg();
  else body.innerHTML=renderContentBotCfg();
  const saveBar=document.querySelector('.save-bar .save-info strong');
  if(saveBar) saveBar.textContent=['TintBot','AdBot','ContentBot'][idx];
  const saveBtn=document.querySelector('.btn-primary');
  if(saveBtn){saveBtn.style.background=['var(--blue)','var(--teal)','var(--purple)'][idx];saveBtn.style.color=idx===1?'#000':'#fff';}
  attachEvents();
}

function saveCfg(btn){
  const orig=btn.textContent;
  btn.textContent='✓ Saved';btn.style.background='var(--green)';btn.style.color='#000';
  setTimeout(()=>{btn.textContent=orig;btn.style.background='var(--blue)';btn.style.color='#fff';},2000);
}

// ── DEMO ENGINE ───────────────────────────────────────────────────────────
function switchDemoType(type){
  demoType=type;demoStep=0;demoTyping=false;
  renderContent();
}
function switchPersona(id){
  currentPersona=id;
  renderContent();
}

function initDemo(){
  demoStep=0;demoTyping=false;
  const msgs=document.getElementById('demo-msgs');
  if(msgs){msgs.innerHTML='';}
  const flow=DEMO_FLOWS[demoType];
  setTimeout(()=>{
    addDemoMsg(flow[0].bot,'bot');
    setDemoQuicks(flow[0].quick);
    updateDemoLead({name:"Incoming lead",vehicle:"Vehicle TBD",badge:"new"});
  },300);
}

function addDemoMsg(text,who){
  const m=document.getElementById('demo-msgs');
  if(!m)return;
  const d=document.createElement('div');
  d.className='msg '+(who==='bot'?'in':'out');
  const b=document.createElement('div');
  b.className='bubble';b.textContent=text;
  const t=document.createElement('div');
  t.className='msg-time';t.textContent='just now';
  d.appendChild(b);d.appendChild(t);
  if(who==='bot'){
    const tag=document.createElement('div');
    const p=PERSONAS.find(x=>x.id===currentPersona);
    tag.className='bot-tag';
    tag.textContent=`⚡ ${p.name} · TintBot · Ceramic Pro Elite`;
    d.appendChild(tag);
  }
  m.appendChild(d);
  m.scrollTop=m.scrollHeight;
}

function setDemoQuicks(qs){
  const c=document.getElementById('demo-quick');
  if(!c)return;
  c.innerHTML=qs.map(q=>`<button class="qbtn" onclick="handleDemoQuick('${q.replace(/'/g,"\\'")}')">${q}</button>`).join('');
}

function handleDemoQuick(text){addDemoMsg(text,'user');processDemoResponse(text);}

function demoSend(){
  const inp=document.getElementById('demo-input');
  if(!inp||!inp.value.trim()||demoTyping)return;
  const text=inp.value.trim();inp.value='';
  addDemoMsg(text,'user');processDemoResponse(text);
}

function processDemoResponse(text){
  demoTyping=true;setDemoQuicks([]);
  const flow=DEMO_FLOWS[demoType];
  const current=flow[Math.min(demoStep,flow.length-1)];
  const next=typeof current.next==='function'?current.next(text.toLowerCase()):current.next;
  demoStep=Math.min(next,flow.length-1);
  // typing indicator
  const m=document.getElementById('demo-msgs');
  if(m){
    const typing=document.createElement('div');
    typing.className='msg in';typing.id='demo-typing';
    typing.innerHTML='<div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>';
    m.appendChild(typing);m.scrollTop=m.scrollHeight;
  }
  setTimeout(()=>{
    const t=document.getElementById('demo-typing');if(t)t.remove();
    const step=flow[demoStep];
    addDemoMsg(step.bot,'bot');
    if(step.pkgs) renderDemoPkgs(step.pkgs);
    if(step.lead) updateDemoLead(step.lead);
    if(step.showSummary) showDemoSummary();
    setDemoQuicks(step.quick||[]);
    demoTyping=false;
  },900+Math.random()*400);
}

function renderDemoPkgs(indices){
  const el=document.getElementById('demo-pkgs');if(!el)return;
  const pkgSrc=demoType==='coating'?PACKAGES:demoType==='tint'?TINT_PKGS:PPF_PKGS;
  el.innerHTML=indices.map((i,idx)=>`
    <div class="pkg-card ${idx===0?'sel-pkg':''}" onclick="this.parentElement.querySelectorAll('.pkg-card').forEach(c=>c.classList.remove('sel-pkg'));this.classList.add('sel-pkg')">
      <div class="pkg-row">
        <span class="pkg-name">${pkgSrc[i]?pkgSrc[i].name:'Package'}</span>
        <span class="pkg-price">${pkgSrc[i]?pkgSrc[i].price:'—'}</span>
      </div>
      <div class="pkg-detail">${pkgSrc[i]?pkgSrc[i].detail:''}</div>
    </div>`).join('');
}

function updateDemoLead(data){
  if(!data)return;
  const n=document.getElementById('demo-lead-name');
  const v=document.getElementById('demo-lead-veh');
  const b=document.getElementById('demo-badge');
  const s=document.getElementById('demo-svc-badge');
  if(n&&data.name)n.textContent=data.name;
  if(v&&data.vehicle)v.textContent=data.vehicle;
  if(b&&data.badge){
    b.className=`demo-badge db-${data.badge}`;
    b.textContent=data.badge.charAt(0).toUpperCase()+data.badge.slice(1);
  }
  if(s)s.style.display='inline-block';
}

function showDemoSummary(){
  const el=document.getElementById('demo-summary');if(!el)return;
  const labels={coating:'Coating',tint:'Window Tint',ppf:'PPF'};
  const pkgs={coating:'Gold ($1,199)',tint:'KAVACA Ceramic IR ($480)',ppf:'Full Front ($899)'};
  const vehicles={coating:'2024 BMW X5',tint:'2023 Tesla Model 3',ppf:'2025 Porsche 911'};
  el.className='summary-box vis';
  el.innerHTML=`<strong>Quote Summary</strong><br>Package: ${pkgs[demoType]}<br>Vehicle: ${vehicles[demoType]}<br>Deposit: 10%<br>Warranty: Lifetime<br>Registered: ceramicpro.com/warranty`;
}

function demoNudge(){addDemoMsg("Scheduling a follow-up nudge in 24 hours...","bot");}
function demoQuote(){
  addDemoMsg("Generating quote and deposit link...","bot");
  setTimeout(()=>addDemoMsg("Quote sent via SMS. Deposit link: nxtwraps.com/pay · Ceramic Pro Elite warranty included.","bot"),800);
}

showView('dashboard');
